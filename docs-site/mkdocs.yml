site_name: Recommender systems
site_description: Beginner friendly notes and experiments for recommender systems.
site_url: https://billzi2016.github.io/Recommender-Systems/
repo_url: https://github.com/billzi2016/Recommender-Systems
repo_name: billzi2016/Recommender-Systems
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search
  - mermaid2
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 中文
          build: true
          site_name: 推荐系统学习笔记
          nav_translations:
            Home: 首页
            Getting started: 入门
            Datasets: 数据集
            MovieLens: MovieLens
            Algorithms: 算法
            Traditional statistics: 传统统计
            Retrieval: 召回
            Feature crossing: 特征交叉
            Deep ranking: 深度精排
            Sequential recommendation: 序列推荐
            Graph recommendation: 图推荐
            Project: 项目
            Documentation setup: 文档工程
            Specs: 规格说明
            MkDocs PRD: MkDocs PRD
            GitHub Actions PRD: GitHub Actions PRD

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Datasets:
      - MovieLens: datasets/movie_lens/index.md
  - Algorithms:
      - Traditional statistics:
          - Overview: algorithms/traditional-statistics/index.md
          - Item-CF:
              - Guide: algorithms/traditional-statistics/item-cf/index.md
              - Report: algorithms/traditional-statistics/item-cf/report.md
          - User-CF:
              - Guide: algorithms/traditional-statistics/user-cf/index.md
              - Report: algorithms/traditional-statistics/user-cf/report.md
          - Matrix factorization:
              - Guide: algorithms/traditional-statistics/matrix-factorization/index.md
              - Report: algorithms/traditional-statistics/matrix-factorization/report.md
      - Retrieval:
          - Overview: algorithms/retrieval/index.md
          - Two tower retrieval:
              - Guide: algorithms/retrieval/two-tower-tfrs/index.md
              - Report: algorithms/retrieval/two-tower-tfrs/report.md
      - Feature crossing:
          - Overview: algorithms/feature-crossing/index.md
          - FM:
              - Guide: algorithms/feature-crossing/fm/index.md
              - Report: algorithms/feature-crossing/fm/report.md
          - DeepFM:
              - Guide: algorithms/feature-crossing/deepfm/index.md
              - Report: algorithms/feature-crossing/deepfm/report.md
          - xDeepFM:
              - Guide: algorithms/feature-crossing/xdeepfm/index.md
              - Report: algorithms/feature-crossing/xdeepfm/report.md
      - Deep ranking:
          - Overview: algorithms/deep-ranking/index.md
          - NCF:
              - Guide: algorithms/deep-ranking/ncf/index.md
              - Report: algorithms/deep-ranking/ncf/report.md
          - Wide and deep:
              - Guide: algorithms/deep-ranking/wide-and-deep/index.md
              - Report: algorithms/deep-ranking/wide-and-deep/report.md
          - DCN:
              - Guide: algorithms/deep-ranking/dcn/index.md
              - Report: algorithms/deep-ranking/dcn/report.md
      - Sequential recommendation:
          - Overview: algorithms/sequential-recommendation/index.md
          - GRU4Rec:
              - Guide: algorithms/sequential-recommendation/gru4rec/index.md
              - Report: algorithms/sequential-recommendation/gru4rec/report.md
          - SASRec:
              - Guide: algorithms/sequential-recommendation/sasrec/index.md
              - Report: algorithms/sequential-recommendation/sasrec/report.md
      - Graph recommendation:
          - Overview: algorithms/graph-recommendation/index.md
          - LightGCN: algorithms/graph-recommendation/lightgcn/index.md
          - NGCF: algorithms/graph-recommendation/ngcf/index.md
  - Project:
      - Documentation setup: project/documentation.md
      - Specs:
          - MkDocs PRD: project/mkdocs-prd.md
          - GitHub Actions PRD: project/github-actions-prd.md
